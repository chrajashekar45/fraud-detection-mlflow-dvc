services:
  fraud-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  fraud-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_URL=http://fraud-api:8000
    depends_on:
      - fraud-api
    restart: unless-stopped