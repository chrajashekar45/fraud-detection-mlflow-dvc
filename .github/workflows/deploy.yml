name: Deploy to EC2

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_REGION: ap-southeast-2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,AWS_REGION
          script: |
            set -e

            cd ~/fraud-detection-mlflow-dvc

            git pull origin main

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            . .venv/bin/activate

            python -m pip install --upgrade pip
            pip install "dvc[s3]==3.64.2" "pathspec==0.12.1" dvc-s3

            dvc pull models/model.pkl
            dvc pull models/pruned_feature_cols.json

            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker/docker-compose.yml up -d --build
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose -f docker/docker-compose.yml up -d --build
            else
              echo "Neither docker compose plugin nor docker-compose binary is available"
              exit 1
            fi

            docker ps